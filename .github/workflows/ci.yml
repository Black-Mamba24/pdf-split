name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version: "1.25.0"
          cache: true
      - run: go test -race ./...
      - run: go vet ./...
      - run: go test ./internal/domain -fuzz FuzzSplitPlanValidateNeverPanics -fuzztime 10s
      - run: go test ./internal/cli -fuzz FuzzParseSizeNeverPanics -fuzztime 10s
      - run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build ./cmd/pdf-split
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build ./cmd/pdf-split
      - run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build ./cmd/pdf-split
      - run: bash scripts/check-licenses.sh

  visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version: "1.25.0"
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - run: go test -tags visual ./internal/integration -run TestSplitPagesRenderLikeOriginal -v
